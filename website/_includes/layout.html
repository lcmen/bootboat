<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if title %}{{ title }} — {% endif %}Bootboat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/index.css' | url }}" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-secondary-50 font-sans text-secondary-700">

<div class="layout" x-data="{ sidebarOpen: false }">

  {% include "nav.html" %}

  <!-- Mobile menu button -->
  <button @click="sidebarOpen = true" class="mobile-menu-btn" aria-label="Open menu">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>

  <div class="content-wrapper">
    <main class="main-content">
      {{ content }}
    </main>

    <footer class="footer">
      <p>
        Visual design based on <a href="https://sailboatui.com/" class="link-xs">Sailboat UI</a> by Jeremie Carlson
        &middot; <a href="https://github.com/lcmen/bootboat" class="link-xs">GitHub</a>
        &middot; <a href="https://github.com/lcmen/bootboat/blob/main/LICENSE" class="link-xs">MIT License</a>
      </p>
    </footer>
  </div>

</div>

</body>
</html>
